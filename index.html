<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoSignal AI</title>
    <script>
      (function() {
        // Create a safe global proxy
        var safeGlobal = {
          fetch: window.fetch.bind(window),
          global: null,
          window: window,
          self: window
        };
        safeGlobal.global = safeGlobal;

        window.global = new Proxy(safeGlobal, {
          get: function(target, prop) {
            if (prop in target) return target[prop];
            return window[prop];
          },
          set: function(target, prop, value) {
            if (prop === 'fetch') {
              console.warn('Blocked attempt to overwrite fetch on global');
              return true;
            }
            try {
              window[prop] = value;
            } catch (e) {
              target[prop] = value;
            }
            return true;
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
